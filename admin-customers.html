<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/admin.css">
<style>

    .admin-nav, .admin-user { display: none; }
    .admin-header-inner { padding: 0 15px; }
    .admin-layout { flex-direction: column; }
    .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
    .sidebar-section { display: flex; overflow-x: auto; padding: 10px; gap: 8px; scrollbar-width: none; }
    .sidebar-section::-webkit-scrollbar { display: none; }
    .sidebar-title { display: none; }

<body class="admin-body">

<header class="admin-header">
<div class="container">
<div class="admin-header-inner flex-between">
<div class="flex gap-md">
<a href="admin-dashboard.html" class="logo">GURU<span>TECH</span></a>
<nav class="admin-nav">
<a href="admin-dashboard.html">Dashboard</a>
<a href="admin-orders.html">Orders</a>

</nav>
</div>
<div class="flex gap-md" style="align-items:center">
<span class="admin-user" id="admin-name">...</span>
<button class="btn btn-sm" style="background:#333;color:#fff" onclick="logout()">Logout</button>
</div>
</div>
</div>
</header>

<div class="admin-layout">
<aside class="admin-sidebar">
<div class="sidebar-section">
<div class="sidebar-title">Main</div>
<a href="admin-dashboard.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
Dashboard

<a href="admin-orders.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>

<a href="admin-products.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
Products

<a href="admin-customers.html" class="sidebar-link active">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
Customers
</a>
</div>
</aside>

<main class="admin-main">
<div class="page-header">
<h1>Customers</h1>
<input type="text" id="customer-search" placeholder="Search customers..." style="width:300px;padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px">
</div>

<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
<div class="stat-card"><div class="stat-label">Total Customers</div><div class="stat-value" id="total-customers">0</div></div>
<div class="stat-card"><div class="stat-label">New This Month</div><div class="stat-value" id="new-customers">0</div></div>
<div class="stat-card"><div class="stat-label">Avg. Order Value</div><div class="stat-value" id="avg-order">KES 0</div></div>
</div>

<div class="data-table">
<table>
<thead>
<tr><th>Customer</th><th>Email</th><th>Phone</th><th>Orders</th><th>Total Spent</th><th>Last Order</th></tr>
</thead>
<tbody id="customers-table"></tbody>
</table>
</div>
</main>
</div>

<script src="js/app.js"></script>
<script>
const API_BASE = window.location.origin + '/api';

async function checkAuth() {
  try {
    const r = await fetch(API_BASE + '/auth/admin/me', { credentials: 'include' });
    if (!r.ok) throw new Error('Unauthorized');
    const data = await r.json();
    document.getElementById('admin-name').textContent = data.data.admin.name || data.data.admin.email;
  } catch(e) { window.location.href = 'admin-login.html'; }
}

async function logout() {
  try { await fetch(API_BASE + '/auth/admin/logout', { method: 'POST', credentials: 'include' }); } catch(e) {}
  window.location.href = 'admin-login.html';
}

function loadCustomers() {
  const orders = JSON.parse(localStorage.getItem('gurutech_orders') || '[]');
  const customers = {};
  orders.forEach(order => {
    const email = order.customer.email || 'unknown';
    if (!customers[email]) {
      customers[email] = {
        name: order.customer.name || 'N/A',
        email: email,
        phone: order.customer.phone || 'N/A',
        orders: 0,
        total: 0,
        lastOrder: order.date
      };
    }
    customers[email].orders++;
    customers[email].total += order.total;
    if (new Date(order.date) > new Date(customers[email].lastOrder)) customers[email].lastOrder = order.date;
  });
  const list = Object.values(customers);
  document.getElementById('total-customers').textContent = list.length;
  document.getElementById('new-customers').textContent = list.length;
  const avgOrder = list.length > 0 ? list.reduce((s,c) => s + c.total, 0) / list.reduce((s,c) => s + c.orders, 0) : 0;
  document.getElementById('avg-order').textContent = App.formatPrice(Math.round(avgOrder));
  renderTable(list);
}

function renderTable(customers) {
  const search = document.getElementById('customer-search').value.toLowerCase();
  let filtered = customers;
  if (search) filtered = filtered.filter(c => c.name.toLowerCase().includes(search) || c.email.toLowerCase().includes(search));
  document.getElementById('customers-table').innerHTML = filtered.map(c => {
    const lastDate = new Date(c.lastOrder);
    return '<tr><td style="font-weight:600">' + c.name + '</td><td>' + c.email + '</td><td>' + c.phone + '</td><td>' + c.orders + '</td><td style="font-weight:700">' + App.formatPrice(c.total) + '</td><td>' + lastDate.toLocaleDateString('en-KE') + '</td></tr>';
  }).join('') || '<tr><td colspan="6" style="text-align:center;color:#666;padding:40px">No customers found</td></tr>';
}

document.getElementById('customer-search').addEventListener('input', () => loadCustomers());

checkAuth().then(() => loadCustomers());
</script>
</body>
</html>
