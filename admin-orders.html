<main class="admin-main">
<div class="page-header">
<h1>Orders</h1>
<div class="flex gap-sm">
<input type="text" id="order-search" placeholder="Search orders..." style="width:240px;padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px">
<select id="status-filter" style="padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px;background:#fff">
<option value="">All Statuses</option>
<option value="completed">Completed</option>
<option value="pending">Pending</option>
<option value="processing">Processing</option>
<option value="cancelled">Cancelled</option>
</select>
</div>
</div>

<div class="data-table">
<table>
<thead>
<tr><th>Order #</th><th>Customer</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th>Payment</th><th>Actions</th></tr>
</thead>
<tbody id="orders-table"></tbody>
</table>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:14px;color:#666">
<span id="orders-count">0 orders</span>
<div class="flex gap-sm">
<button class="btn btn-sm btn-secondary" id="prev-page">Previous</button>
<span id="page-info">Page 1 of 1</span>
<button class="btn btn-sm btn-secondary" id="next-page">Next</button>
</div>
</div>
</main>
</div>

<div class="admin-modal-overlay" id="order-modal">
<div class="admin-modal" style="max-width:700px">
<div class="admin-modal-header">
<h3>Order Details <span id="modal-order-number"></span></h3>
<button class="admin-modal-close" id="modal-close-btn">&times;</button>
</div>
<div class="admin-modal-body" id="modal-body"></div>
<div class="admin-modal-footer">
<button class="btn btn-secondary" id="modal-cancel-btn">Close</button>
<button class="btn btn-primary" id="update-status-btn">Update Status</button>
</div>
</div>
</div>

<script src="js/app.js"></script>
<script>
const API_BASE = window.location.origin + '/api';
const statusLabels = {
  completed: { label: 'Completed', class: 'status-completed' },
  pending: { label: 'Pending', class: 'status-pending' },
  processing: { label: 'Processing', class: 'status-processing' },
  cancelled: { label: 'Cancelled', class: 'status-cancelled' }
};
let allOrders = [];
let currentViewingOrderId = null;
let currentPage = 1;
const perPage = 10;

async function checkAuth() {
  try {
    const r = await fetch(API_BASE + '/auth/admin/me', { credentials: 'include' });
    if (!r.ok) throw new Error('Unauthorized');
    const data = await r.json();
    document.getElementById('admin-name').textContent = data.data.admin.name || data.data.admin.email;
  } catch(e) { window.location.href = 'admin-login.html'; }
}

async function logout() {
  try { await fetch(API_BASE + '/auth/admin/logout', { method: 'POST', credentials: 'include' }); } catch(e) {}
  window.location.href = 'admin-login.html';
}

async function loadOrders() {
  try {
    const r = await fetch(API_BASE + '/orders');
    const res = await r.json();
    allOrders = res.data || [];
    renderOrders();
  } catch (err) { console.error('Failed to load orders:', err); }
}

function renderOrders() {
  const search = document.getElementById('order-search').value.toLowerCase();
  const statusFilter = document.getElementById('status-filter').value;
  let filtered = allOrders;
  if (search) filtered = filtered.filter(o => o.number.toLowerCase().includes(search) || (o.customer?.name && o.customer.name.toLowerCase().includes(search)) || (o.customer?.email && o.customer.email.toLowerCase().includes(search)));
  if (statusFilter) filtered = filtered.filter(o => (o.status || 'completed') === statusFilter);
  const totalPages = Math.ceil(filtered.length / perPage) || 1;
  const start = (currentPage - 1) * perPage;
  const pageOrders = filtered.slice(start, start + perPage);
  document.getElementById('orders-count').textContent = filtered.length + ' order' + (filtered.length !== 1 ? 's' : '');
  document.getElementById('page-info').textContent = 'Page ' + currentPage + ' of ' + totalPages;
  document.getElementById('prev-page').disabled = currentPage === 1;
  document.getElementById('next-page').disabled = currentPage === totalPages;
  document.getElementById('orders-table').innerHTML = pageOrders.map(order => {
    const date = new Date(order.date);
    const status = order.status || 'completed';
    return '<tr><td><strong>#' + order.number + '</strong></td><td><div style="font-weight:600">' + (order.customer.name || 'N/A') + '</div><div style="font-size:12px;color:#666">' + (order.customer.email || 'N/A') + '</div></td><td>' + date.toLocaleDateString('en-KE') + '</td><td>' + order.items.reduce((s,i) => s + i.quantity, 0) + ' items</td><td style="font-weight:700">' + App.formatPrice(order.total) + '</td><td><span class="status-badge ' + statusLabels[status].class + '">' + statusLabels[status].label + '</span></td><td>M-Pesa</td><td><button class="btn btn-sm btn-secondary view-btn" data-number="' + order.number + '">View</button></td></tr>';
  }).join('') || '<tr><td colspan="8" style="text-align:center;color:#666;padding:40px">No orders found</td></tr>';
}

function initEventHandlers() {
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('update-status-btn').addEventListener('click', updateStatus);
  
  document.getElementById('orders-table').addEventListener('click', (e) => {
    const btn = e.target.closest('.view-btn');
    if (btn) {
      viewOrder(btn.getAttribute('data-number'));
    }
  });
}

function viewOrder(number) {
  const order = allOrders.find(o => o.number === number);
  if (!order) return;
  currentViewingOrderId = order._id || order.id;
  const date = new Date(order.date);
  const status = order.status || 'completed';
  document.getElementById('modal-order-number').textContent = '#' + order.number;
  document.getElementById('modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">
      <div>
        <h4 style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Customer</h4>
        <p style="font-weight:600">${order.customer.name || 'N/A'}</p>
        <p style="font-size:14px;color:#666">${order.customer.email || 'N/A'}</p>
      </div>
      <div>
        <h4 style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Actions</h4>
        <label style="font-size:12px;display:block;margin-bottom:4px">Update Status</label>
        <select id="modal-status-select" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px">
          <option value="pending" ${status === 'pending' ? 'selected' : ''}>Pending</option>
          <option value="processing" ${status === 'processing' ? 'selected' : ''}>Processing</option>
          <option value="completed" ${status === 'completed' ? 'selected' : ''}>Completed</option>
          <option value="cancelled" ${status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
        </select>
      </div>
    </div>
    <h4 style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Order Items</h4>
    <div style="border:1px solid #eee;border-radius:4px;overflow:hidden">
      ${order.items.map(item => `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #eee">
        <span>${item.name} × ${item.quantity}</span>
        <span style="font-weight:600">${App.formatPrice(item.price * item.quantity)}</span>
      </div>`).join('')}
      <div style="display:flex;justify-content:space-between;padding:16px;background:#f9f9f9">
        <span style="font-weight:700">Total</span>
        <span style="font-weight:700;font-size:18px">${App.formatPrice(order.total)}</span>
      </div>
    </div>`;
  document.getElementById('order-modal').classList.add('active');
}

function closeModal() { document.getElementById('order-modal').classList.remove('active'); }

async function updateStatus() {
  const status = document.getElementById('modal-status-select').value;
  try {
    const r = await fetch(`${API_BASE}/orders/${currentViewingOrderId}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    if (!r.ok) throw new Error('Failed to update');
    App.toast('Order status updated', 'success');
    closeModal();
    loadOrders();
  } catch (err) { App.toast('Error updating status', 'error'); }
}

document.getElementById('order-search').addEventListener('input', () => { currentPage = 1; renderOrders(); });
document.getElementById('status-filter').addEventListener('change', () => { currentPage = 1; renderOrders(); });
document.getElementById('prev-page').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderOrders(); } });
document.getElementById('next-page').addEventListener('click', () => { currentPage++; renderOrders(); });

checkAuth().then(() => {
  loadOrders();
  initEventHandlers();
});
</script>
</body>
</html>
