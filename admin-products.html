<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/styles.css">

    .admin-header-inner { padding: 0 15px; }
    .admin-layout { flex-direction: column; }
    .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
    .sidebar-section { display: flex; overflow-x: auto; padding: 10px; gap: 8px; scrollbar-width: none; }
    .sidebar-section::-webkit-scrollbar { display: none; }
    .sidebar-title { display: none; }
    .sidebar-link { margin-bottom: 0; white-space: nowrap; padding: 8px 12px; font-size: 13px; }
    .sidebar-link svg { width: 16px; height: 16px; margin-right: 4px; }
    .flex-between:not(.admin-header-inner) { flex-direction: column; align-items: stretch; gap: 10px; }
    #product-search { width: 100% !important; }
  }
</style>
</head>
<body class="admin-body">

<header class="admin-header">
<div class="container">
<div class="admin-header-inner flex-between">
<div class="flex gap-md">
<a href="admin-dashboard.html" class="logo">GURU<span>TECH</span></a>
<nav class="admin-nav">
<a href="admin-dashboard.html">Dashboard</a>
<a href="admin-orders.html">Orders</a>
<a href="admin-products.html" class="active">Products</a>
<a href="admin-customers.html">Customers</a>
</nav>
</div>
<div class="flex gap-md" style="align-items:center">
<span class="admin-user" id="admin-name">...</span>
<button class="btn btn-sm" style="background:#333;color:#fff" id="logout-btn">Logout</button>
</div>
</div>
</div>
</header>

<div class="admin-layout">
<aside class="admin-sidebar">
<div class="sidebar-section">
<div class="sidebar-title">Main</div>
<a href="admin-dashboard.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
Dashboard
</a>
<a href="admin-orders.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
Orders
</a>
<a href="admin-products.html" class="sidebar-link active">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
Products
</a>
<a href="admin-customers.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
Customers
</a>
</div>
</aside>

<main class="admin-main">
<div class="page-header">
<h1>Products</h1>
<button class="btn btn-primary" id="add-product-btn">+ Add Product</button>
</div>

<div class="flex-between" style="margin-bottom:16px">
<input type="text" id="product-search" placeholder="Search products..." style="width:300px;padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px">
<select id="category-filter" style="padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px;background:#fff">
<option value="">All Categories</option>
<option value="laptops">Laptops</option>
<option value="phones">Phones</option>
<option value="audio">Audio</option>
<option value="gaming">Gaming</option>
<option value="tablets">Tablets</option>
<option value="cameras">Cameras</option>
<option value="tvs">TVs</option>
<option value="accessories">Accessories</option>
<option value="wearables">Wearables</option>
</select>
</div>

<div class="data-table">
<table>
<thead>
<tr><th>Product</th><th>Category</th><th>Brand</th><th>Price</th><th>Stock</th><th>Rating</th><th>Actions</th></tr>
</thead>
<tbody id="products-table"></tbody>
</table>
</div>
</main>
</div>

<div class="admin-modal-overlay" id="product-modal">
<div class="admin-modal">
<div class="admin-modal-header">
<h3 id="modal-title">Add Product</h3>
<button class="admin-modal-close" id="modal-close-btn">&times;</button>
</div>
<div class="admin-modal-body">
<form id="product-form">
<div class="form-group">
<label>Product Name</label>
<input type="text" id="prod-name" required>
</div>
<div class="form-row-3">
<div class="form-group">
<label>Category</label>
<select id="prod-category" required>
<option value="">Select</option>
<option value="laptops">Laptops</option>
<option value="phones">Phones</option>
<option value="audio">Audio</option>
<option value="gaming">Gaming</option>
<option value="tablets">Tablets</option>
<option value="cameras">Cameras</option>
<option value="tvs">TVs</option>
<option value="accessories">Accessories</option>
<option value="wearables">Wearables</option>
</select>
</div>
<div class="form-group">
<label>Brand</label>
<input type="text" id="prod-brand" required>
</div>
<div class="form-group">
<label>Price (KES)</label>
<input type="number" id="prod-price" required min="0">
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>Stock Quantity</label>
<input type="number" id="prod-stock" required min="0">
</div>
<div class="form-group">
<label>Old Price (KES) - Optional</label>
<input type="number" id="prod-old-price" min="0">
</div>
</div>
<div class="form-group">
<label>Image URL</label>
<input type="url" id="prod-image" placeholder="https://...">
</div>
<div class="form-group">
<label>Specifications (JSON format)</label>
<textarea id="prod-specs" rows="3" placeholder='{"processor":"M3","ram":"8GB"}'></textarea>
</div>
</form>
</div>
<div class="admin-modal-footer" id="modal-actions">
<button class="btn btn-secondary" id="cancel-btn">Cancel</button>
<button class="btn btn-primary" id="save-product-btn">Save Product</button>
</div>
</div>
</div>

<script src="js/app.js"></script>
<script>
const API_BASE = window.location.origin + '/api';
let allProducts = [];
let currentEditId = null;

async function checkAuth() {
  try {
    const r = await fetch(API_BASE + '/auth/admin/me', { credentials: 'include' });
    if (!r.ok) throw new Error('Unauthorized');
    const data = await r.json();
    document.getElementById('admin-name').textContent = data.data.admin.name || data.data.admin.email;
  } catch(e) { window.location.href = 'admin-login.html'; }
}

async function logout() {
  try { await fetch(API_BASE + '/auth/admin/logout', { method: 'POST', credentials: 'include' }); } catch(e) {}
  window.location.href = 'admin-login.html';
}

async function loadProducts() {
  try {
    const r = await fetch(API_BASE + '/products');
    const res = await r.json();
    allProducts = res.data || [];
    renderProducts();
  } catch(err) { console.error('Failed to load:', err); }
}

function renderProducts() {
  const search = document.getElementById('product-search').value.toLowerCase();
  const cat = document.getElementById('category-filter').value;
  let filtered = allProducts;
  if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || p.brand.toLowerCase().includes(search));
  if (cat) filtered = filtered.filter(p => p.category === cat);
  document.getElementById('products-table').innerHTML = filtered.map(p => {
    const stockClass = p.stock > 10 ? 'in-stock' : p.stock > 0 ? 'low-stock' : 'out-of-stock';
    return '<tr><td style="display:flex;align-items:center;gap:12px"><img src="' + p.image + '" alt="' + p.name + '" class="product-admin-img"><span style="font-weight:600">' + p.name + '</span></td><td>' + p.category.charAt(0).toUpperCase() + p.category.slice(1) + '</td><td>' + p.brand + '</td><td style="font-weight:700">' + App.formatPrice(p.price) + '</td><td><span class="stock-status ' + stockClass + '">' + p.stock + '</span></td><td>' + p.rating + ' ★</td><td><button class="btn btn-sm btn-secondary edit-btn" data-id="' + p.id + '">Edit</button><button class="btn btn-sm delete-btn" style="background:#ffebee;color:#c62828;margin-left:4px" data-id="' + p.id + '">Delete</button></td></tr>';
  }).join('') || '<tr><td colspan="7" style="text-align:center;color:#666;padding:40px">No products found</td></tr>';
}

function initEventHandlers() {
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('add-product-btn').addEventListener('click', openProductModal);
  document.getElementById('modal-close-btn').addEventListener('click', closeProductModal);
  document.getElementById('cancel-btn').addEventListener('click', closeProductModal);
  document.getElementById('save-product-btn').addEventListener('click', saveProduct);
  
  // Event delegation for table buttons
  document.getElementById('products-table').addEventListener('click', (e) => {
    const editBtn = e.target.closest('.edit-btn');
    const deleteBtn = e.target.closest('.delete-btn');
    
    if (editBtn) {
      const id = parseInt(editBtn.getAttribute('data-id'));
      editProduct(id);
    }
    
    if (deleteBtn) {
      const id = parseInt(deleteBtn.getAttribute('data-id'));
      deleteProduct(id);
    }
  });
}

function openProductModal() {
  document.getElementById('modal-title').textContent = 'Add Product';
  currentEditId = null;
  document.getElementById('product-form').reset();
  document.getElementById('product-modal').classList.add('active');
}
function closeProductModal() { document.getElementById('product-modal').classList.remove('active'); }

async function saveProduct() {
  const name = document.getElementById('prod-name').value;
  const category = document.getElementById('prod-category').value;
  const brand = document.getElementById('prod-brand').value;
  const price = parseInt(document.getElementById('prod-price').value);
  const stock = parseInt(document.getElementById('prod-stock').value);
  const oldPrice = parseInt(document.getElementById('prod-old-price').value) || null;
  const image = document.getElementById('prod-image').value || 'https://via.placeholder.com/400';
  let specs = {};
  
  try {
    specs = JSON.parse(document.getElementById('prod-specs').value || '{}');
  } catch (e) {
    alert('Invalid JSON in Specifications');
    return;
  }

  if (!name || !category || !brand || !price || isNaN(stock)) { alert('Fill all required fields'); return; }
  
  const productData = { name, category, brand, price, stock, oldPrice, image, specs };
  const url = currentEditId ? `${API_BASE}/products/${currentEditId}` : `${API_BASE}/products`;
  const method = currentEditId ? 'PUT' : 'POST';

  try {
    const r = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(productData)
    });
    
    if (!r.ok) throw new Error('Failed to save');
    
    App.toast(currentEditId ? 'Product updated' : 'Product added', 'success');
    closeProductModal();
    loadProducts();
  } catch (err) {
    App.toast('Error saving product', 'error');
  }
}

async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  try {
    const r = await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('Delete failed');
    App.toast('Product deleted', 'success');
    loadProducts();
  } catch (err) {
    App.toast('Error deleting product', 'error');
  }
}

function editProduct(id) {
  const p = allProducts.find(x => x._id === id || x.id === id);
  if (!p) return;
  currentEditId = p._id || p.id;
  document.getElementById('modal-title').textContent = 'Edit Product';
  document.getElementById('prod-name').value = p.name;
  document.getElementById('prod-category').value = p.category;
  document.getElementById('prod-brand').value = p.brand;
  document.getElementById('prod-price').value = p.price;
  document.getElementById('prod-stock').value = p.stock;
  document.getElementById('prod-old-price').value = p.oldPrice || '';
  document.getElementById('prod-image').value = p.image;
  document.getElementById('prod-specs').value = JSON.stringify(p.specs || {});
  document.getElementById('product-modal').classList.add('active');
}

document.getElementById('product-search').addEventListener('input', renderProducts);
document.getElementById('category-filter').addEventListener('change', renderProducts);

checkAuth().then(() => {
  loadProducts();
  initEventHandlers();
});
</script>
</body>
</html>
