<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard - GURUTECH Admin</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/admin.css">
<style>
  @media (max-width: 768px) {
    .admin-nav, .admin-user { display: none; }
    .admin-header-inner { padding: 0 15px; }
    .admin-layout { flex-direction: column; }
    .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
    .sidebar-section { display: flex; overflow-x: auto; padding: 10px; gap: 8px; scrollbar-width: none; }
    .sidebar-section::-webkit-scrollbar { display: none; }
    .sidebar-title { display: none; }
    .sidebar-link { margin-bottom: 0; white-space: nowrap; padding: 8px 12px; font-size: 13px; }
    .sidebar-link svg { width: 16px; height: 16px; margin-right: 4px; }
    .stats-grid, .charts-grid { grid-template-columns: 1fr !important; }
    .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  }
</style>
</head>
<body class="admin-body">

<header class="admin-header">
<div class="container">
<div class="admin-header-inner flex-between">
<div class="flex gap-md">
<a href="admin-dashboard.html" class="logo">GURU<span>TECH</span></a>
<nav class="admin-nav">
<a href="admin-dashboard.html" class="active">Dashboard</a>
<a href="admin-orders.html">Orders</a>
<a href="admin-products.html">Products</a>
<a href="admin-customers.html">Customers</a>
</nav>
</div>
<div class="flex gap-md" style="align-items:center">
<span class="admin-user" id="admin-name">...</span>
<button class="btn btn-sm" style="background:#333;color:#fff" id="logout-btn">Logout</button>
</div>
</div>
</div>
</header>

<div class="admin-layout">
<aside class="admin-sidebar">
<div class="sidebar-section">
<div class="sidebar-title">Main</div>
<a href="admin-dashboard.html" class="sidebar-link active">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
Dashboard
</a>
<a href="admin-orders.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
Orders
</a>
<a href="admin-products.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
Products
</a>
<a href="admin-customers.html" class="sidebar-link">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
Customers
</a>
</div>
</aside>

<main class="admin-main">
<div class="page-header">
<h1>Dashboard</h1>
<span style="font-size:14px;color:#666">Today: <span id="today-date"></span></span>
</div>

<div class="stats-grid" id="stats-grid">
<div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value" id="stat-revenue">KES 0</div></div>
<div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value" id="stat-orders">0</div></div>
<div class="stat-card"><div class="stat-label">Products Sold</div><div class="stat-value" id="stat-products">0</div></div>
<div class="stat-card"><div class="stat-label">Customers</div><div class="stat-value" id="stat-customers">0</div></div>
</div>

<div class="charts-grid">
<div class="chart-card">
<h3>Sales Overview (Last 7 Days)</h3>
<div class="bar-chart" id="sales-chart"></div>
</div>
<div class="chart-card">
<h3>Orders by Status</h3>
<div id="status-chart" style="padding:20px 0"></div>
</div>
</div>

<div style="margin-bottom:20px">
<div class="page-header" style="margin-bottom:16px">
<h2 style="font-size:18px">Recent Orders</h2>
<a href="admin-orders.html" style="font-size:14px;color:#666">View All →</a>
</div>
<div class="data-table">
<table>
<thead><tr><th>Order #</th><th>Customer</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th></tr></thead>
<tbody id="recent-orders"></tbody>
</table>
</div>
</div>
</main>
</div>

<script src="js/app.js"></script>
<script>
const API_BASE = window.location.origin + '/api';

// Auth check
async function checkAuth() {
  try {
    const r = await fetch(API_BASE + '/auth/admin/me', { credentials: 'include' });
    if (!r.ok) throw new Error('Unauthorized');
    const data = await r.json();
    document.getElementById('admin-name').textContent = data.data.admin.name || data.data.admin.email;
    return data.data.admin;
  } catch(e) {
    window.location.href = 'admin-login.html';
  }
}

async function logout() {
  try {
    await fetch(API_BASE + '/auth/admin/logout', { method: 'POST', credentials: 'include' });
  } catch(e) {}
  window.location.href = 'admin-login.html';
}

async function loadDashboard() {
  let orders = [];
  try {
    const r = await fetch(API_BASE + '/orders');
    const res = await r.json();
    orders = res.data || [];
  } catch (err) { console.error('Failed to load stats:', err); }

  const totalRevenue = orders.reduce((s,o) => s + o.total, 0);
  const totalItems = orders.reduce((s,o) => s + o.items.reduce((a,i) => a + i.quantity, 0), 0);

  document.getElementById('stat-revenue').textContent = App.formatPrice(totalRevenue);
  document.getElementById('stat-orders').textContent = orders.length || 0;
  document.getElementById('stat-products').textContent = totalItems;
  document.getElementById('stat-customers').textContent = new Set(orders.map(o => o.customer.email)).size;

  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const salesData = [45000,62000,38000,89000,54000,76000,91000];
  const maxSale = Math.max(...salesData);
  document.getElementById('sales-chart').innerHTML = days.map((d,i) => `
    <div class="bar-item"><div class="bar" style="height:${(salesData[i]/maxSale)*180}px"></div><div class="bar-label">${d}</div></div>
  `).join('');

  const statuses = {completed:0,pending:0,processing:0,cancelled:0};
  orders.forEach(o => { statuses[o.status||'completed'] = (statuses[o.status||'completed']||0)+1 });
  const labels = {completed:'Completed',pending:'Pending',processing:'Processing',cancelled:'Cancelled'};
  const classes = {completed:'status-completed',pending:'status-pending',processing:'status-processing',cancelled:'status-cancelled'};
  document.getElementById('status-chart').innerHTML = Object.entries(statuses).map(([k,v]) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee">
      <span class="status-badge ${classes[k]}">${labels[k]}</span><span style="font-weight:700;font-size:18px">${v}</span>
    </div>
  `).join('');

  const recent = [...orders].reverse().slice(0,10);
  document.getElementById('recent-orders').innerHTML = recent.map(o => `
    <tr><td><strong>#${o.number}</strong></td><td>${o.customer.name||'N/A'}</td>
    <td>${new Date(o.date).toLocaleDateString('en-KE')}</td><td>${o.items.length} item${o.items.length>1?'s':''}</td>
    <td>${App.formatPrice(o.total)}</td><td><span class="status-badge ${classes[o.status||'completed']}">${labels[o.status||'completed']}</span></td></tr>
  `).join('') || '<tr><td colspan="6" style="text-align:center;color:#666;padding:40px">No orders yet</td></tr>';
}

document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

checkAuth().then(() => {
  loadDashboard();
  document.getElementById('logout-btn').addEventListener('click', logout);
});
</script>
</body>
</html>
